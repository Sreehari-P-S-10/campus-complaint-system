<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Dashboard - View and manage your campus complaints">
    <title>Student Dashboard | Campus Complaint System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark-custom">
            <div class="container">
                <a class="navbar-brand" href="/student-dashboard">
                    <span class="navbar-brand-icon">🏫</span>
                    Campus Complaints
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/student-dashboard">
                                <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/create-complaint">
                                <i class="bi bi-plus-circle me-1"></i>New Complaint
                            </a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <div class="user-info">
                            <div class="user-avatar" id="userAvatar">S</div>
                            <span id="userName">Student</span>
                        </div>
                        <button class="btn-logout" id="logoutBtn">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">📊 My Dashboard</h1>
                <p class="page-subtitle">Track and manage your campus complaints</p>
            </div>

            <!-- Statistics Cards -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-lg-3">
                    <div class="stat-card total fade-in-up stagger-1">
                        <div class="stat-icon">📋</div>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total Complaints</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card open fade-in-up stagger-2">
                        <div class="stat-icon">🔓</div>
                        <div class="stat-value" id="statOpen">0</div>
                        <div class="stat-label">Open</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card inprogress fade-in-up stagger-3">
                        <div class="stat-icon">⚙️</div>
                        <div class="stat-value" id="statProgress">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="stat-card resolved fade-in-up stagger-4">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="statResolved">0</div>
                        <div class="stat-label">Resolved</div>
                    </div>
                </div>
            </div>

            <!-- Complaints Table -->
            <div class="glass-card fade-in-up">
                <div class="glass-card-header">
                    <h2 class="glass-card-title">
                        <i class="bi bi-list-ul"></i> My Complaints
                    </h2>
                    <div class="d-flex gap-2 flex-wrap">
                        <a href="/create-complaint" class="btn btn-gradient" style="width: auto; padding: 0.5rem 1.2rem; font-size: 0.85rem;">
                            <i class="bi bi-plus-lg me-1"></i>New Complaint
                        </a>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filter-bar mb-3">
                    <select class="form-select" id="filterStatus">
                        <option value="">All Status</option>
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                    <select class="form-select" id="filterCategory">
                        <option value="">All Categories</option>
                        <option value="Hostel">Hostel</option>
                        <option value="WiFi">WiFi</option>
                        <option value="Classroom">Classroom</option>
                        <option value="Mess">Mess</option>
                    </select>
                    <div class="search-input-wrapper">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search complaints...">
                    </div>
                    <button class="btn-outline-glass" id="clearFilters">
                        <i class="bi bi-x-lg me-1"></i>Clear
                    </button>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table-glass">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsTableBody">
                            <tr>
                                <td colspan="6">
                                    <div class="loading-overlay">
                                        <div class="spinner-glow"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Ticket Detail Modal -->
    <div class="modal fade" id="ticketDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Complaint Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ticketDetailBody">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Student Dashboard JS -->
    <script src="/js/student.js"></script>
</body>
</html>
