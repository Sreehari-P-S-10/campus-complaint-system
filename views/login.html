<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to the Campus Complaint & Maintenance Management System">
    <title>Login | Campus Complaint System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <div class="logo-icon">🏫</div>
                    <h1>Campus Complaints</h1>
                    <p>Maintenance Management System</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" novalidate>
                    <div class="form-floating">
                        <input type="email" class="form-control" id="loginEmail" placeholder="Email address" required autocomplete="email">
                        <label for="loginEmail"><i class="bi bi-envelope me-2"></i>Email address</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required autocomplete="current-password">
                        <label for="loginPassword"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>

                    <button type="submit" class="btn btn-gradient mt-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <!-- Footer -->
                <div class="auth-footer">
                    Don't have an account? <a href="/register">Create one</a>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth JS -->
    <script src="/js/auth.js"></script>
</body>
</html>
