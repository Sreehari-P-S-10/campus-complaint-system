<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for the Campus Complaint & Maintenance Management System">
    <title>Register | Campus Complaint System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <div class="logo-icon">🏫</div>
                    <h1>Create Account</h1>
                    <p>Join the Campus Complaint System</p>
                </div>

                <!-- Register Form -->
                <form id="registerForm" novalidate>
                    <div class="form-floating">
                        <input type="text" class="form-control" id="regName" placeholder="Full Name" required autocomplete="name">
                        <label for="regName"><i class="bi bi-person me-2"></i>Full Name</label>
                    </div>

                    <div class="form-floating">
                        <input type="email" class="form-control" id="regEmail" placeholder="Email address" required autocomplete="email">
                        <label for="regEmail"><i class="bi bi-envelope me-2"></i>Email address</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="regPassword" placeholder="Password" required autocomplete="new-password">
                        <label for="regPassword"><i class="bi bi-lock me-2"></i>Password (min 6 chars)</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm Password" required autocomplete="new-password">
                        <label for="regConfirmPassword"><i class="bi bi-lock-fill me-2"></i>Confirm Password</label>
                    </div>

                    <button type="submit" class="btn btn-gradient mt-2">
                        <i class="bi bi-person-plus me-2"></i>Create Account
                    </button>
                </form>

                <!-- Footer -->
                <div class="auth-footer">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth JS -->
    <script src="/js/auth.js"></script>
</body>
</html>
