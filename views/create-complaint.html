<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit a new campus complaint or maintenance request">
    <title>New Complaint | Campus Complaint System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark-custom">
            <div class="container">
                <a class="navbar-brand" href="/student-dashboard">
                    <span class="navbar-brand-icon">🏫</span>
                    Campus Complaints
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/student-dashboard">
                                <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/create-complaint">
                                <i class="bi bi-plus-circle me-1"></i>New Complaint
                            </a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <div class="user-info">
                            <div class="user-avatar" id="userAvatar">S</div>
                            <span id="userName">Student</span>
                        </div>
                        <button class="btn-logout" id="logoutBtn">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">📝 New Complaint</h1>
                <p class="page-subtitle">Report a campus issue or maintenance request</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="glass-card fade-in-up">
                        <form id="complaintForm" novalidate>
                            <!-- Title -->
                            <div class="mb-3">
                                <label for="complaintTitle" class="form-label" style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem;">
                                    Complaint Title <span style="color: var(--accent-red);">*</span>
                                </label>
                                <input type="text" class="form-control" id="complaintTitle" 
                                       placeholder="e.g., WiFi not working in Room 204" 
                                       required minlength="5" maxlength="255"
                                       style="background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-primary); padding: 0.75rem 1rem; border-radius: var(--radius-sm);">
                            </div>

                            <!-- Category -->
                            <div class="mb-3">
                                <label for="complaintCategory" class="form-label" style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem;">
                                    Category <span style="color: var(--accent-red);">*</span>
                                </label>
                                <select class="form-select" id="complaintCategory" required>
                                    <option value="">Select a category...</option>
                                    <option value="Hostel">🏠 Hostel</option>
                                    <option value="WiFi">📶 WiFi</option>
                                    <option value="Classroom">🏫 Classroom</option>
                                    <option value="Mess">🍽️ Mess</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div class="mb-3">
                                <label for="complaintDescription" class="form-label" style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem;">
                                    Description <span style="color: var(--accent-red);">*</span>
                                </label>
                                <textarea class="form-control" id="complaintDescription" rows="5" 
                                          placeholder="Describe the issue in detail. Include location, when it started, and any other relevant information..."
                                          required minlength="10"></textarea>
                            </div>

                            <!-- File Upload -->
                            <div class="mb-4">
                                <label class="form-label" style="color: var(--text-secondary); font-weight: 600; font-size: 0.9rem;">
                                    Attachments <span style="color: var(--text-muted); font-weight: 400;">(Optional, max 5 files, 5MB each)</span>
                                </label>
                                <div class="file-upload-area" id="fileUploadArea">
                                    <div class="upload-icon">📁</div>
                                    <p>Drag & drop files here or <span class="browse-link">browse</span></p>
                                    <small style="color: var(--text-muted);">Supports: Images (JPEG, PNG, GIF, WebP), PDF, DOC, DOCX</small>
                                </div>
                                <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx" style="display: none;">
                                <div class="file-list" id="fileList" style="display: none;"></div>
                            </div>

                            <!-- Submit -->
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-gradient" style="flex: 1;">
                                    <i class="bi bi-send me-2"></i>Submit Complaint
                                </button>
                                <a href="/student-dashboard" class="btn btn-outline-glass" style="padding: 0.85rem 1.5rem;">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Complaint JS -->
    <script src="/js/complaint.js"></script>
</body>
</html>
