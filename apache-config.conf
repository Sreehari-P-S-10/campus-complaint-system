# ============================================
# Apache Reverse Proxy Configuration
# Campus Complaint & Maintenance Management System
# ============================================
#
# This file configures Apache to act as a reverse proxy,
# forwarding requests from port 80 to the Node.js server on port 3000.
#
# ============================================
# SETUP INSTRUCTIONS
# ============================================
#
# === FOR LINUX (Ubuntu/Debian) ===
#
# 1. Install Apache:
#    sudo apt update
#    sudo apt install apache2
#
# 2. Enable required modules:
#    sudo a2enmod proxy
#    sudo a2enmod proxy_http
#
# 3. Copy this config:
#    sudo cp apache-config.conf /etc/apache2/sites-available/campus-complaints.conf
#
# 4. Enable the site:
#    sudo a2ensite campus-complaints.conf
#    sudo a2dissite 000-default.conf    (optional: disable default site)
#
# 5. Restart Apache:
#    sudo systemctl restart apache2
#
# 6. Start Node.js server:
#    cd /path/to/complaint-system
#    node server.js
#
# 7. Access the app at: http://localhost
#
#
# === FOR WINDOWS (XAMPP) ===
#
# 1. Install XAMPP from https://www.apachefriends.org/
#
# 2. Open XAMPP Control Panel
#
# 3. Edit Apache httpd.conf:
#    - Click "Config" next to Apache → httpd.conf
#    - Uncomment these lines (remove the #):
#      LoadModule proxy_module modules/mod_proxy.so
#      LoadModule proxy_http_module modules/mod_proxy_http.so
#
# 4. Edit httpd-vhosts.conf:
#    - Click "Config" → httpd-vhosts.conf
#    - Add the VirtualHost block below
#
# 5. Restart Apache from XAMPP Control Panel
#
# 6. Start Node.js server:
#    cd C:\Users\Sreehari\Desktop\Complaint System
#    node server.js
#
# 7. Access the app at: http://localhost
#
# ============================================

<VirtualHost *:80>
    ServerName localhost
    ServerAdmin admin@campus.edu

    # Enable reverse proxy
    ProxyPreserveHost On
    ProxyRequests Off

    # Forward all requests to Node.js server
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Logging (Linux paths - adjust for Windows/XAMPP)
    ErrorLog ${APACHE_LOG_DIR}/campus-complaints-error.log
    CustomLog ${APACHE_LOG_DIR}/campus-complaints-access.log combined
</VirtualHost>
